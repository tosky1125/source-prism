name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  foundation:
    name: foundation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: source_prism
          POSTGRES_USER: source_prism
          POSTGRES_PASSWORD: source_prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U source_prism -d source_prism"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      opensearch:
        image: opensearchproject/opensearch:2.19.3
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
          - 9600:9600
        options: >-
          --health-cmd "curl -fsS http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    env:
      DATABASE_URL: postgres://source_prism:source_prism@localhost:5432/source_prism
      OPENSEARCH_URL: http://localhost:9200
      API_BIND_ADDR: 127.0.0.1:4096

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check SQLx offline metadata
        run: cargo sqlx prepare --workspace --check

      - name: Smoke CLI
        run: |
          cargo run -p ri-cli -- config check --env-file .env.example
          cargo run -p ri-cli -- db migrate
          cargo run -p ri-cli -- repo manifest --repo . | grep '"kind": "manifest"'
          cargo run -p ri-cli -- index --repo . --sha HEAD > /tmp/source-prism-cli-index.json
          grep '"kind": "index"' /tmp/source-prism-cli-index.json
          grep '"indexed_symbols":' /tmp/source-prism-cli-index.json
          grep '"indexed_graph_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_import_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_call_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_test_cover_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_search_chunks":' /tmp/source-prism-cli-index.json
          grep '"indexed_test_cases":' /tmp/source-prism-cli-index.json
          cargo run -p ri-cli -- symbols --repo . > /tmp/source-prism-symbols.json
          impact_symbol=$(python3 -c 'import json; data=json.load(open("/tmp/source-prism-symbols.json")); print(next(symbol["fqn"] for symbol in data["symbols"] if symbol["kind"] == "function"))')
          cargo run -p ri-cli -- impact --symbol "$impact_symbol" > /tmp/source-prism-impact.json
          grep '"kind": "impact"' /tmp/source-prism-impact.json
          grep '"status": "ok"' /tmp/source-prism-impact.json
          grep '"impact_score"' /tmp/source-prism-impact.json
          cargo run -p ri-cli -- impact --symbol 'InvoiceService::applyTax' > /tmp/source-prism-invoice-impact.json
          grep '"kind": "impact"' /tmp/source-prism-invoice-impact.json
          grep '"status": "ok"' /tmp/source-prism-invoice-impact.json
          test_symbol=$(python3 -c 'import json; data=json.load(open("/tmp/source-prism-symbols.json")); print(next(symbol["fqn"] for symbol in data["symbols"] if symbol["kind"] == "test_case"))')
          cargo run -p ri-cli -- test-context --symbol "$test_symbol" > /tmp/source-prism-test-context.json
          grep '"kind": "test_context"' /tmp/source-prism-test-context.json
          grep '"code_execution_allowed": false' /tmp/source-prism-test-context.json
          printf '%s\n' '<coverage><packages><package><classes><class filename="src/lib.rs"><lines><line number="1" hits="1"/></lines></class></classes></package></packages></coverage>' > /tmp/source-prism-cobertura.xml
          cargo run -p ri-cli -- tests import-cobertura --repo . --sha HEAD --cobertura /tmp/source-prism-cobertura.xml > /tmp/source-prism-cobertura.json
          grep '"kind": "coverage"' /tmp/source-prism-cobertura.json
          grep '"format": "cobertura"' /tmp/source-prism-cobertura.json
          grep '"imported_segments": 1' /tmp/source-prism-cobertura.json

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Smoke OpenSearch
        run: curl -fsS http://localhost:9200/_cluster/health

      - name: Smoke API
        run: |
          cargo run -p ri-api > /tmp/source-prism-api.log 2>&1 &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4096/v1/health > /tmp/source-prism-api-health.json; then
              grep '"status":"ok"' /tmp/source-prism-api-health.json
              curl -fsS -X POST http://127.0.0.1:4096/v1/repos \
                -H 'content-type: application/json' \
                --data '{"repo_id":"source-prism-ci","name":"source-prism-ci","default_branch":"main"}' \
                > /tmp/source-prism-api-repo.json
              grep '"kind":"repo"' /tmp/source-prism-api-repo.json
              grep '"persisted":true' /tmp/source-prism-api-repo.json
              curl -fsS -X POST http://127.0.0.1:4096/v1/repos/source-prism-ci/index \
                -H 'content-type: application/json' \
                --data '{"sha":"HEAD"}' \
                > /tmp/source-prism-api-index.json
              grep '"kind":"index"' /tmp/source-prism-api-index.json
              grep '"status":"succeeded"' /tmp/source-prism-api-index.json
              grep '"inserted_file_manifests":' /tmp/source-prism-api-index.json
              grep '"indexed_symbols":' /tmp/source-prism-api-index.json
              grep '"indexed_graph_edges":' /tmp/source-prism-api-index.json
              grep '"indexed_import_edges":' /tmp/source-prism-api-index.json
              grep '"indexed_call_edges":' /tmp/source-prism-api-index.json
              grep '"indexed_test_cover_edges":' /tmp/source-prism-api-index.json
              grep '"indexed_search_chunks":' /tmp/source-prism-api-index.json
              grep '"indexed_test_cases":' /tmp/source-prism-api-index.json
              run_id=$(python3 -c 'import json; print(json.load(open("/tmp/source-prism-api-index.json"))["run_id"])')
              curl -fsS "http://127.0.0.1:4096/v1/runs/${run_id}" > /tmp/source-prism-api-run.json
              grep '"kind":"run"' /tmp/source-prism-api-run.json
              grep '"status":"succeeded"' /tmp/source-prism-api-run.json
              curl -fsS -X POST http://127.0.0.1:4096/v1/context/search \
                -H 'content-type: application/json' \
                --data '{"repo_id":"source-prism-ci","query":"search_context"}' \
                > /tmp/source-prism-api-context.json
              grep '"kind":"context_search"' /tmp/source-prism-api-context.json
              grep '"vector_only":false' /tmp/source-prism-api-context.json
              curl -fsS -X POST http://127.0.0.1:4096/v1/impact \
                -H 'content-type: application/json' \
                --data '{"repo_id":"source-prism-ci","symbol":"impact_symbols"}' \
                > /tmp/source-prism-api-impact.json
              grep '"kind":"impact"' /tmp/source-prism-api-impact.json
              grep '"impact_score":' /tmp/source-prism-api-impact.json
              curl -fsS http://127.0.0.1:4096/v1/repos/local/symbols > /tmp/source-prism-api-symbols.json
              grep '"kind":"symbols"' /tmp/source-prism-api-symbols.json
              grep '"symbol_count":' /tmp/source-prism-api-symbols.json
              curl -fsS http://127.0.0.1:4096/v1/repos/source-prism-ci/tests > /tmp/source-prism-api-tests.json
              grep '"kind":"tests"' /tmp/source-prism-api-tests.json
              grep '"test_count":' /tmp/source-prism-api-tests.json
              api_test_symbol=$(python3 -c 'import json; data=json.load(open("/tmp/source-prism-api-symbols.json")); print(next(symbol["fqn"] for symbol in data["symbols"] if symbol["kind"] == "test_case"))')
              curl -fsS -X POST http://127.0.0.1:4096/v1/test-context \
                -H 'content-type: application/json' \
                --data "{\"repo_id\":\"source-prism-ci\",\"symbol\":\"${api_test_symbol}\"}" \
                > /tmp/source-prism-api-test-context.json
              grep '"kind":"test_context"' /tmp/source-prism-api-test-context.json
              grep '"code_execution_allowed":false' /tmp/source-prism-api-test-context.json
              curl -fsS http://127.0.0.1:4096/v1/repos/source-prism-ci/graph > /tmp/source-prism-api-graph.json
              grep -q '"kind":"graph"' /tmp/source-prism-api-graph.json
              grep -q '"edge_count":' /tmp/source-prism-api-graph.json
              grep -q '"edge_type":"imports"' /tmp/source-prism-api-graph.json
              grep -q '"edge_type":"calls"' /tmp/source-prism-api-graph.json
              grep -q '"edge_type":"test_covers"' /tmp/source-prism-api-graph.json
              curl -fsS http://127.0.0.1:4096/v1/repos/local/files > /tmp/source-prism-api-files.json
              grep '"kind":"files"' /tmp/source-prism-api-files.json
              grep '"file_count":' /tmp/source-prism-api-files.json
              exit 0
            fi
            sleep 1
          done
          cat /tmp/source-prism-api.log
          exit 1

      - name: Smoke worker
        run: cargo run -p ri-worker -- --once | grep 'ri-worker once processed='
