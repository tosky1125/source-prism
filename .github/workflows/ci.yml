name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  foundation:
    name: foundation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: source_prism
          POSTGRES_USER: source_prism
          POSTGRES_PASSWORD: source_prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U source_prism -d source_prism"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      opensearch:
        image: opensearchproject/opensearch:2.19.3
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
          - 9600:9600
        options: >-
          --health-cmd "curl -fsS http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    env:
      DATABASE_URL: postgres://source_prism:source_prism@localhost:5432/source_prism
      OPENSEARCH_URL: http://localhost:9200
      API_BIND_ADDR: 127.0.0.1:4096

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check SQLx offline metadata
        run: cargo sqlx prepare --workspace --check

      - name: Smoke CLI
        run: |
          cargo run -p ri-cli -- config check --env-file .env.example
          cargo run -p ri-cli -- db migrate
          cargo run -p ri-cli -- repo manifest --repo . | grep '"kind": "manifest"'
          cargo run -p ri-cli -- impact --repo . --symbol search_context_command > /tmp/source-prism-smoke-impact.json
          grep '"kind": "impact"' /tmp/source-prism-smoke-impact.json
          grep '"status": "ok"' /tmp/source-prism-smoke-impact.json
          cargo run -p ri-cli -- mcp tools > /tmp/source-prism-mcp-tools.json
          grep '"kind": "mcp_tool_catalog"' /tmp/source-prism-mcp-tools.json
          grep '"repo.search_context"' /tmp/source-prism-mcp-tools.json
          cargo run -p ri-cli -- mcp call --repo . --tool repo.get_symbol --symbol search_context_command > /tmp/source-prism-mcp-call.json
          grep '"kind": "mcp_tool_result"' /tmp/source-prism-mcp-call.json
          grep '"tool": "repo.get_symbol"' /tmp/source-prism-mcp-call.json
          cargo run -p ri-cli -- mcp call --repo . --tool repo.get_test_context --symbol mcp_tools_command_returns_repo_tool_catalog > /tmp/source-prism-mcp-test-context.json
          grep '"tool": "repo.get_test_context"' /tmp/source-prism-mcp-test-context.json
          grep '"code_execution_allowed": false' /tmp/source-prism-mcp-test-context.json
          cat > /tmp/source-prism-mcp-request.json <<'JSON'
          {
            "jsonrpc": "2.0",
            "id": 7,
            "method": "tools/call",
            "params": {
              "name": "repo.get_symbol",
              "arguments": {
                "symbol": "search_context_command"
              }
            }
          }
          JSON
          cargo run -p ri-cli -- mcp serve --repo . --once --request /tmp/source-prism-mcp-request.json > /tmp/source-prism-mcp-response.json
          grep '"jsonrpc": "2.0"' /tmp/source-prism-mcp-response.json
          grep '"isError": false' /tmp/source-prism-mcp-response.json
          grep '"fqn": "search_context_command"' /tmp/source-prism-mcp-response.json
          embedding_provider="source-prism-ci-${GITHUB_RUN_ID:-local}"
          cargo run -p ri-cli -- embeddings cache-put --provider "$embedding_provider" --model local-v1 --kind symbol --dimensions 3 --input 'InvoiceService::applyTax' --vector '0.1,0.2,0.3' > /tmp/source-prism-embedding-first.json
          grep '"kind": "embedding_cache"' /tmp/source-prism-embedding-first.json
          grep '"cache_hit": false' /tmp/source-prism-embedding-first.json
          cargo run -p ri-cli -- embeddings cache-put --provider "$embedding_provider" --model local-v1 --kind symbol --dimensions 3 --input 'InvoiceService::applyTax' --vector '0.1,0.2,0.3' > /tmp/source-prism-embedding-second.json
          grep '"cache_hit": true' /tmp/source-prism-embedding-second.json
          cargo run -p ri-cli -- index --repo . --sha HEAD > /tmp/source-prism-cli-index.json
          grep '"kind": "index"' /tmp/source-prism-cli-index.json
          grep '"indexed_symbols":' /tmp/source-prism-cli-index.json
          grep '"indexed_graph_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_import_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_call_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_test_cover_edges":' /tmp/source-prism-cli-index.json
          grep '"indexed_search_chunks":' /tmp/source-prism-cli-index.json
          grep '"search_sync_queue": "default"' /tmp/source-prism-cli-index.json
          grep '"enqueued_search_sync_jobs": 1' /tmp/source-prism-cli-index.json
          grep '"indexed_test_cases":' /tmp/source-prism-cli-index.json
          cli_repo_id=$(python3 -c 'import json; print(json.load(open("/tmp/source-prism-cli-index.json"))["repo_id"])')
          cli_run_id=$(python3 -c 'import json; print(json.load(open("/tmp/source-prism-cli-index.json"))["generation_id"])')
          cargo run -p ri-cli -- search rebuild --from-postgres --generation "$cli_run_id" > /tmp/source-prism-cli-search-rebuild.txt
          cargo run -p ri-cli -- search-context --repo-id "$cli_repo_id" search_context > /tmp/source-prism-cli-persisted-context.json
          grep '"kind": "search_context"' /tmp/source-prism-cli-persisted-context.json
          grep '"bm25_hit_count":' /tmp/source-prism-cli-persisted-context.json
          cargo run -p ri-cli -- run --run-id "$cli_run_id" > /tmp/source-prism-cli-run.json
          grep '"kind": "run"' /tmp/source-prism-cli-run.json
          grep '"status": "succeeded"' /tmp/source-prism-cli-run.json
          cargo run -p ri-cli -- runs --repo-id "$cli_repo_id" > /tmp/source-prism-cli-runs.json
          grep '"kind": "repo_runs"' /tmp/source-prism-cli-runs.json
          grep '"run_count": 1' /tmp/source-prism-cli-runs.json
          cargo run -p ri-cli -- symbols --repo . > /tmp/source-prism-symbols.json
          impact_symbol=$(python3 -c 'import json; data=json.load(open("/tmp/source-prism-symbols.json")); print(next(symbol["fqn"] for symbol in data["symbols"] if symbol["kind"] == "function"))')
          cargo run -p ri-cli -- impact --symbol "$impact_symbol" > /tmp/source-prism-impact.json
          grep '"kind": "impact"' /tmp/source-prism-impact.json
          grep '"status": "ok"' /tmp/source-prism-impact.json
          grep '"impact_score"' /tmp/source-prism-impact.json
          cargo run -p ri-cli -- impact --repo-id "$cli_repo_id" --symbol "$impact_symbol" > /tmp/source-prism-persisted-impact.json
          grep '"kind": "impact"' /tmp/source-prism-persisted-impact.json
          grep '"repo_id":' /tmp/source-prism-persisted-impact.json
          cargo run -p ri-cli -- references --repo-id "$cli_repo_id" --symbol "$impact_symbol" > /tmp/source-prism-persisted-references.json
          grep '"kind": "references"' /tmp/source-prism-persisted-references.json
          grep '"repo_id":' /tmp/source-prism-persisted-references.json
          test_symbol=$(python3 -c 'import json; data=json.load(open("/tmp/source-prism-symbols.json")); print(next(symbol["fqn"] for symbol in data["symbols"] if symbol["kind"] == "test_case"))')
          cargo run -p ri-cli -- test-context --symbol "$test_symbol" > /tmp/source-prism-test-context.json
          grep '"kind": "test_context"' /tmp/source-prism-test-context.json
          grep '"code_execution_allowed": false' /tmp/source-prism-test-context.json
          cargo run -p ri-cli -- test-context --repo-id "$cli_repo_id" --symbol "$test_symbol" > /tmp/source-prism-persisted-test-context.json
          grep '"kind": "test_context"' /tmp/source-prism-persisted-test-context.json
          grep '"code_execution_allowed": false' /tmp/source-prism-persisted-test-context.json
          cat > /tmp/source-prism-review-findings.json <<'JSON'
          [
            {
              "title": "Tax rounding can skip fractional cents",
              "severity": "medium",
              "file_path": "src/invoice.rs",
              "start_line": 12,
              "end_line": 16,
              "evidence": [
                {
                  "file_path": "src/invoice.rs",
                  "start_line": 12,
                  "end_line": 16,
                  "summary": "rounding happens before line item aggregation"
                }
              ],
              "impact_path": [
                {
                  "source": "InvoiceService::applyTax",
                  "relation": "calls",
                  "target": "Money::round"
                }
              ],
              "recommendation": "Round only after summing line item tax amounts."
            }
          ]
          JSON
          cargo run -p ri-cli -- review github-dry-run --input /tmp/source-prism-review-findings.json > /tmp/source-prism-github-review.json
          grep '"kind": "github_review_dry_run"' /tmp/source-prism-github-review.json
          grep '"annotation_level": "warning"' /tmp/source-prism-github-review.json
          grep '"version": "2.1.0"' /tmp/source-prism-github-review.json
          cargo run -p ri-cli -- review gitlab-dry-run --input /tmp/source-prism-review-findings.json > /tmp/source-prism-gitlab-review.json
          grep '"kind": "gitlab_review_dry_run"' /tmp/source-prism-gitlab-review.json
          grep '"severity": "major"' /tmp/source-prism-gitlab-review.json
          grep '"new_path": "src/invoice.rs"' /tmp/source-prism-gitlab-review.json
          printf '%s\n' '<coverage><packages><package><classes><class filename="src/lib.rs"><lines><line number="1" hits="1"/></lines></class></classes></package></packages></coverage>' > /tmp/source-prism-cobertura.xml
          cargo run -p ri-cli -- tests import-cobertura --repo . --sha HEAD --cobertura /tmp/source-prism-cobertura.xml > /tmp/source-prism-cobertura.json
          grep '"kind": "coverage"' /tmp/source-prism-cobertura.json
          grep '"format": "cobertura"' /tmp/source-prism-cobertura.json
          grep '"imported_segments": 1' /tmp/source-prism-cobertura.json
          printf '%s\n' '<report><package name="src"><sourcefile name="lib.rs"><line nr="1" mi="0" ci="1" mb="0" cb="0"/></sourcefile></package></report>' > /tmp/source-prism-jacoco.xml
          cargo run -p ri-cli -- tests import-jacoco --repo . --sha HEAD --jacoco /tmp/source-prism-jacoco.xml > /tmp/source-prism-jacoco.json
          grep '"kind": "coverage"' /tmp/source-prism-jacoco.json
          grep '"format": "jacoco"' /tmp/source-prism-jacoco.json
          grep '"imported_segments": 1' /tmp/source-prism-jacoco.json
          printf '%s\n' '{"tests":[{"nodeid":"tests/test_invoice.py::test_adds_rate","outcome":"passed"}]}' > /tmp/source-prism-pytest.json
          cargo run -p ri-cli -- tests import-pytest-json --repo . --sha HEAD --pytest-json /tmp/source-prism-pytest.json > /tmp/source-prism-pytest.json.out
          grep '"kind": "test_runs"' /tmp/source-prism-pytest.json.out
          grep '"framework": "pytest"' /tmp/source-prism-pytest.json.out
          grep '"imported_results": 1' /tmp/source-prism-pytest.json.out
          printf '%s\n' '{"suites":[{"title":"chromium","file":"tests/invoice.spec.ts","specs":[{"title":"adds tax","tests":[{"projectName":"chromium","status":"expected","results":[{"status":"passed","duration":5}]}]}]}]}' > /tmp/source-prism-playwright.json
          cargo run -p ri-cli -- tests import-playwright-json --repo . --sha HEAD --playwright-json /tmp/source-prism-playwright.json > /tmp/source-prism-playwright.json.out
          grep '"kind": "test_runs"' /tmp/source-prism-playwright.json.out
          grep '"framework": "playwright"' /tmp/source-prism-playwright.json.out
          grep '"imported_results": 1' /tmp/source-prism-playwright.json.out
          printf '%s\n' '{"Action":"pass","Package":"example.com/invoice","Test":"TestAddsRate","Elapsed":0.005}' > /tmp/source-prism-go-test.json
          cargo run -p ri-cli -- tests import-go-test-json --repo . --sha HEAD --go-test-json /tmp/source-prism-go-test.json > /tmp/source-prism-go-test.json.out
          grep '"kind": "test_runs"' /tmp/source-prism-go-test.json.out
          grep '"framework": "go_test"' /tmp/source-prism-go-test.json.out
          grep '"imported_results": 1' /tmp/source-prism-go-test.json.out

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Smoke OpenSearch
        run: curl -fsS http://localhost:9200/_cluster/health

      - name: Smoke API
        run: bash scripts/ci/smoke-api.sh

      - name: Smoke worker
        run: |
          noop_queue="worker-noop-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}"
          daemon_queue="worker-daemon-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}"
          search_queue="worker-search-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}"
          cargo run -p ri-worker -- --queue "$noop_queue" --enqueue-noop --once | grep 'ri-worker once processed=1'
          cargo run -p ri-worker -- --queue "$daemon_queue" --enqueue-noop --max-polls 1 --poll-interval-ms 1 | grep 'ri-worker daemon polls=1 processed=1'
          cargo run -p ri-cli -- index --repo . --sha HEAD > /tmp/source-prism-worker-index.json
          cargo run -p ri-worker -- --queue "$search_queue" --enqueue-search-sync --once | grep 'ri-worker once processed=1'
