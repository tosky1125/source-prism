<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Source Prism</title>
  <style>
    :root {
      --paper: #f7f4ed;
      --ink: #191a16;
      --muted: #6d6a60;
      --line: #d8d0c1;
      --panel: #fffdf8;
      --teal: #0f766e;
      --amber: #b45309;
      --rose: #9f1239;
      --graphite: #2b2c27;
      --shadow: 0 18px 48px rgba(25, 26, 22, .10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(15,118,110,.08) 1px, transparent 1px),
        linear-gradient(rgba(180,83,9,.08) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
    }
    button, input { font: inherit; }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(220px, 280px) 1fr;
    }
    aside {
      border-right: 1px solid var(--line);
      background: rgba(255,253,248,.78);
      padding: 24px;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 18px;
    }
    .repo {
      color: var(--muted);
      overflow-wrap: anywhere;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }
    nav {
      display: grid;
      gap: 8px;
      margin-top: 22px;
    }
    nav a {
      color: var(--ink);
      text-decoration: none;
      padding: 10px 0;
      border-bottom: 1px solid transparent;
    }
    nav a[aria-current="page"] {
      border-color: var(--ink);
      color: var(--teal);
      font-weight: 800;
    }
    main { padding: 28px; }
    .topline {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }
    h1 {
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: 0;
      margin: 0;
    }
    .search {
      display: flex;
      gap: 8px;
      min-width: min(440px, 100%);
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--panel);
      color: var(--ink);
    }
    button {
      border: 1px solid var(--graphite);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--graphite);
      color: var(--paper);
      cursor: pointer;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric, .panel {
      background: rgba(255,253,248,.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .metric { padding: 14px; }
    .metric strong {
      display: block;
      font-size: 30px;
      line-height: 1;
    }
    .metric span { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .panel {
      min-height: 260px;
      padding: 16px;
      overflow: hidden;
    }
    .wide { grid-column: span 2; }
    .panel h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    .list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
    }
    .row {
      display: grid;
      gap: 4px;
      border-left: 3px solid var(--teal);
      padding: 8px 10px;
      background: rgba(15,118,110,.06);
      overflow-wrap: anywhere;
    }
    .row:nth-child(3n) { border-color: var(--amber); background: rgba(180,83,9,.06); }
    .row:nth-child(4n) { border-color: var(--rose); background: rgba(159,18,57,.06); }
    .row[data-source="bm25"] { border-color: var(--amber); background: rgba(180,83,9,.08); }
    .meta { color: var(--muted); font-size: 13px; }
    .empty { color: var(--muted); padding: 12px 0; }
    .status {
      color: var(--muted);
      min-height: 20px;
      margin-top: 14px;
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      aside {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      nav { grid-template-columns: repeat(auto-fit, minmax(88px, 1fr)); }
      .topline { display: grid; }
      .metrics, .grid { grid-template-columns: 1fr; }
      .wide { grid-column: span 1; }
    }
  </style>
</head>
<body data-repo-id="__REPO_ID__" data-initial-view="__INITIAL_VIEW__">
  <div class="shell">
    <aside>
      <div class="brand">Source Prism</div>
      <div class="repo" id="repoLabel"></div>
      <nav aria-label="Repository views">
        <a href="#overview" data-view="overview">Overview</a>
        <a href="#files" data-view="files">Files</a>
        <a href="#symbols" data-view="symbols">Symbols</a>
        <a href="#references" data-view="references">References</a>
        <a href="#impact" data-view="impact">Impact</a>
        <a href="#tests" data-view="tests">Tests</a>
        <a href="#coverage" data-view="coverage">Coverage</a>
        <a href="#docs" data-view="docs">Docs</a>
        <a href="#search" data-view="search">Search</a>
      </nav>
    </aside>
    <main>
      <div class="topline">
        <h1>Repo Structure Explorer</h1>
        <form class="search" id="searchForm">
          <input id="query" name="query" autocomplete="off" placeholder="symbol, file, contract">
          <button type="submit" aria-label="Search">Search</button>
        </form>
      </div>
      <section class="metrics" aria-label="Repository metrics">
        <div class="metric"><strong id="fileCount">0</strong><span>Files</span></div>
        <div class="metric"><strong id="symbolCount">0</strong><span>Symbols</span></div>
        <div class="metric"><strong id="referenceCount">0</strong><span>References</span></div>
        <div class="metric"><strong id="edgeCount">0</strong><span>Edges</span></div>
        <div class="metric"><strong id="testCount">0</strong><span>Tests</span></div>
        <div class="metric"><strong id="coverageCount">0</strong><span>Coverage</span></div>
      </section>
      <section class="grid">
        <article class="panel wide" data-panel="overview"><h2>Latest Index</h2><div class="list" id="latestRun"></div><div class="list" id="evidence"></div></article>
        <article class="panel wide" data-panel="files"><h2>Files</h2><div class="list" id="files"></div></article>
        <article class="panel" data-panel="symbols"><h2>Symbols</h2><div class="list" id="symbols"></div></article>
        <article class="panel" data-panel="references"><h2>References</h2><div class="list" id="references"></div></article>
        <article class="panel" data-panel="impact"><h2>Impact Map</h2><div class="list" id="graph"></div></article>
        <article class="panel" data-panel="tests"><h2>Related Tests</h2><div class="list" id="tests"></div></article>
        <article class="panel" data-panel="coverage"><h2>Coverage Evidence</h2><div class="list" id="coverage"></div></article>
        <article class="panel" data-panel="docs"><h2>Docs / Contracts</h2><div class="list" id="docs"></div></article>
        <article class="panel wide" data-panel="search"><h2>Search Results</h2><div class="list" id="searchResults"></div></article>
      </section>
      <div class="status" id="status"></div>
    </main>
  </div>
  <script>
    const repoId = document.body.dataset.repoId;
    const initialView = document.body.dataset.initialView || "overview";
    const repoPath = encodeURIComponent(repoId);
    const repoApi = `/v1/repos/${repoPath}`;
    const api = (path) => `/v1/repos/${repoPath}/${path}`;
    const status = document.querySelector("#status");
    document.querySelector("#repoLabel").textContent = repoId;

    const setView = (view) => {
      document.querySelectorAll("nav a").forEach((item) => {
        item.setAttribute("aria-current", item.dataset.view === view ? "page" : "false");
      });
      document.querySelectorAll("[data-panel]").forEach((panel) => {
        panel.style.outline = panel.dataset.panel === view ? "2px solid var(--teal)" : "0";
      });
      document.querySelector(`[data-panel="${view}"]`)?.scrollIntoView({ block: "start", inline: "nearest" });
    };

    const json = async (url) => {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`${response.status} ${url}`);
      return response.json();
    };

    const row = (title, meta, source) => {
      const item = document.createElement("div");
      item.className = "row";
      if (source) item.dataset.source = source;
      const strong = document.createElement("strong");
      strong.textContent = title;
      const small = document.createElement("span");
      small.className = "meta";
      small.textContent = meta;
      item.append(strong, small);
      return item;
    };

    const renderList = (target, values, emptyText) => {
      target.replaceChildren();
      if (!values.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = emptyText;
        target.append(empty);
        return;
      }
      values.forEach((value) => target.append(value));
    };

    const load = async () => {
      setView(initialView);
      try {
        const [overview, files, symbols, graph, tests, coverage, docs] = await Promise.allSettled([
          json(repoApi),
          json(api("files")),
          json(api("symbols")),
          json(api("graph")),
          json(api("tests")),
          json(api("coverage")),
          json(api("architecture"))
        ]);
        const fileRows = files.value?.files ?? [];
        const symbolRows = symbols.value?.symbols ?? [];
        const latestRun = overview.value?.latest_run ?? null;
        const evidence = latestRun?.evidence ?? {};
        const referenceRows = await referencesFor(symbolRows);
        const testContext = await testContextFor(symbolRows);
        const graphNodes = graph.value?.graph?.nodes ?? [];
        const edgeRows = graph.value?.graph?.edges ?? [];
        const nodeNames = new Map(graphNodes.map((node) => [node.graph_node_id, node.display_name]));
        const testRows = tests.value?.tests ?? [];
        const relatedTests = testContext?.related_tests ?? [];
        const coverageRows = coverage.value?.segments ?? [];
        const docRows = docs.value?.entities ?? [];
        document.querySelector("#fileCount").textContent = evidence.file_manifests ?? fileRows.length;
        document.querySelector("#symbolCount").textContent = evidence.symbols ?? symbolRows.length;
        document.querySelector("#referenceCount").textContent = referenceRows.length;
        document.querySelector("#edgeCount").textContent = evidence.graph_edges ?? edgeRows.length;
        document.querySelector("#testCount").textContent = evidence.test_cases ?? testRows.length;
        document.querySelector("#coverageCount").textContent = coverageRows.length;
        renderLatestRun(latestRun);
        renderEvidence(evidence);
        renderList(document.querySelector("#files"), fileRows.slice(0, 24).map((file) => row(file.path, `${file.language} ${file.size_bytes ?? 0} bytes`)), "No files indexed");
        renderList(document.querySelector("#symbols"), symbolRows.slice(0, 24).map((symbol) => row(symbol.fqn, `${symbol.kind} ${symbol.file_path}`)), "No symbols indexed");
        renderList(document.querySelector("#references"), referenceRows.slice(0, 24).map((ref) => row(`${ref.source_fqn} -> ${ref.target_fqn}`, `${ref.direction} ${ref.relation}`)), "No references indexed");
        renderList(document.querySelector("#graph"), edgeRows.slice(0, 24).map((edge) => row(`${nodeNames.get(edge.source_node_id) ?? edge.source_node_id} -> ${nodeNames.get(edge.target_node_id) ?? edge.target_node_id}`, `${edge.edge_type} ${edge.resolution_method}`)), "No graph edges indexed");
        renderList(document.querySelector("#tests"), relatedTests.slice(0, 24).map((test) => row(test.fqn, `${test.confidence} ${test.file_path}`)), "No related tests found");
        renderList(document.querySelector("#coverage"), coverageRows.slice(0, 24).map((segment) => row(segment.file_path, `${segment.format} lines ${segment.start_line}-${segment.end_line} hits ${segment.hit_count}`)), "No coverage evidence indexed");
        renderList(document.querySelector("#docs"), docRows.slice(0, 24).map((entity) => row(entity.name, `${entity.entity_type} ${entity.file_path}`)), "No docs or contracts indexed");
        status.textContent = "Live";
      } catch (error) {
        status.textContent = error.message;
      }
    };

    const renderLatestRun = (latestRun) => {
      if (!latestRun) {
        renderList(document.querySelector("#latestRun"), [], "No index run recorded");
        return;
      }
      const rows = [
        row(`Run ${latestRun.run_id}`, `${latestRun.status} ${latestRun.index_kind}`),
        row(latestRun.commit_sha, `commit ${latestRun.started_at}`)
      ];
      if (latestRun.finished_at) rows.push(row("Finished", latestRun.finished_at));
      renderList(document.querySelector("#latestRun"), rows, "No index run recorded");
    };

    const renderEvidence = (evidence) => {
      const labels = [
        ["file_manifests", "File manifests"],
        ["symbols", "Symbols"],
        ["graph_nodes", "Graph nodes"],
        ["graph_edges", "Graph edges"],
        ["search_chunks", "Search chunks"],
        ["test_cases", "Test cases"],
        ["architecture_entities", "Architecture entities"]
      ];
      const rows = labels.map(([key, label]) => row(label, String(evidence[key] ?? 0)));
      renderList(document.querySelector("#evidence"), rows, "No evidence counts");
    };

    const referencesFor = async (symbols) => {
      const symbol = symbols.find((item) => item.fqn)?.fqn;
      if (!symbol) return [];
      try {
        const report = await json(`${api("references")}?symbol=${encodeURIComponent(symbol)}`);
        return report.references ?? [];
      } catch (error) {
        return [];
      }
    };

    const testContextFor = async (symbols) => {
      const symbol = symbols.find((item) => item.kind !== "test_case" && item.fqn)?.fqn;
      if (!symbol) return null;
      try {
        const report = await json(`${api("test-context")}?symbol=${encodeURIComponent(symbol)}`);
        return report.test_context ?? null;
      } catch (error) {
        return null;
      }
    };

    const runSearch = async (query) => {
      if (!query) return;
      setView("search");
      const result = await fetch("/v1/context/search", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ repo_id: repoId, query })
      }).then((response) => response.json());
      const hits = result.context_pack?.hits ?? [];
      const bm25 = result.bm25_hits ?? [];
      const symbolRows = hits.map((hit) => row(hit.symbol.fqn, `symbol score ${hit.score} ${hit.symbol.file_path}`));
      const bm25Rows = bm25.map((hit) => row(hit.symbol?.fqn ?? hit.chunk_id, `BM25 score ${hit.score.toFixed(2)} ${hit.symbol?.file_path ?? hit.chunk_id}`, "bm25"));
      renderList(document.querySelector("#searchResults"), symbolRows.concat(bm25Rows), "No matches");
    };

    const runInitialSearch = () => {
      const query = new URLSearchParams(window.location.search).get("q")?.trim();
      if (!query) return;
      document.querySelector("#query").value = query;
      runSearch(query);
    };

    document.querySelectorAll("nav a").forEach((link) => {
      link.addEventListener("click", () => setView(link.dataset.view));
    });
    document.querySelector("#searchForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const query = document.querySelector("#query").value.trim();
      await runSearch(query);
    });
    load().then(runInitialSearch);
  </script>
</body>
</html>
